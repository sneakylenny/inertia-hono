$schema: 'https://moonrepo.dev/schemas/project.json'

id: 'inertia-server'
language: typescript
layer: library
stack: backend

tasks:
  build:
    command: 'bun run build'
    inputs:
      - 'src/**/*'
      - 'package.json'
      - 'tsconfig.json'
      - 'tsconfig.build.json'
    outputs:
      - 'dist'

  test:
    command: 'bun run test'
    inputs:
      - 'src/**/*'
      - 'package.json'
      - 'vitest.config.ts'

  lint:
    command: 'bun run lint:inertia-server'
    options:
      runFromWorkspaceRoot: true
    inputs:
      - 'src/**/*'
      - '/eslint.config.js'
