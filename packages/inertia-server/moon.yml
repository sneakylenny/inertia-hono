$schema: 'https://moonrepo.dev/schemas/project.json'

language: typescript
layer: library
stack: backend

tasks:
  build:
    command: 'bun run build'
    inputs:
      - 'src/**/*'
      - 'tsup.config.ts'
      - 'package.json'
      - 'tsconfig.json'
    outputs:
      - 'dist'

  test:
    command: 'bun run test'
    inputs:
      - 'src/**/*'
      - 'package.json'
      - 'vitest.config.ts'
