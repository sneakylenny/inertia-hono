$schema: 'https://moonrepo.dev/schemas/project.json'

language: typescript
layer: library
stack: backend

dependsOn:
  - 'inertia-server'

tasks:
  build:
    command: 'bun run build'
    deps:
      - 'inertia-server:build'
    inputs:
      - 'src/**/*'
      - 'package.json'
      - 'tsconfig.json'
      - 'tsconfig.build.json'
      - 'project://inertia-server'
    outputs:
      - 'dist'

  test:
    command: 'bun run test'
    deps:
      - 'inertia-server:build'
    inputs:
      - 'src/**/*'
      - 'package.json'
      - 'vitest.config.ts'

  lint:
    command: 'bun run lint:inertia-hono'
    options:
      runFromWorkspaceRoot: true
    inputs:
      - 'src/**/*'
      - '/eslint.config.js'
