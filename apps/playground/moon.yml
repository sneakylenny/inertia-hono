$schema: 'https://moonrepo.dev/schemas/project.json'

language: typescript
layer: application
stack: backend

dependsOn:
  - 'inertia-hono'

tasks:
  dev:
    command: 'bun run dev'
    preset: server
    deps:
      - 'inertia-hono:build'
    inputs:
      - 'src/**/*'
      - 'index.html'
      - 'vite.config.ts'
      - 'package.json'

  test:
    command: 'bun run test'
    inputs:
      - 'src/**/*'
      - 'vitest.config.ts'
      - 'vite.config.ts'
      - 'package.json'
