name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    name: Build, Test & Lint
    # Skip the Changesets version PR and the commit that merges it.
    # Release workflow handles publishing on that merge; re-running CI adds no value.
    if: |
      (github.event_name == 'pull_request' && github.head_ref != 'changeset-release/main') ||
      (github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'Version Packages'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.20"

      - uses: moonrepo/setup-toolchain@v0.6.4
        with:
          auto-install: true

      - run: bun install --frozen-lockfile

      - run: moon run :build
      - run: moon run :test
      - run: moon run :lint
      - run: bunx eslint scripts --max-warnings 0
