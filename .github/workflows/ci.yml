name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    name: Build, Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.20"

      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - run: bun install --frozen-lockfile

      - run: moon run :build
      - run: moon run :test
      - run: bun run lint
